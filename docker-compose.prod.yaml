services:
  web:
    image: ${APP_IMAGE:-registry.alphasystems.co.ke/settlement-mpesa-service:latest}
    pull_policy: always
    container_name: settlement-maji-web-prod
    env_file:
      - .maji.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8000"
    volumes:
      - ./security:/app/security:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: settlement-maji-nginx-prod
    ports:
      - "8000:80"
      - "444:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_volume:
  media_volume: