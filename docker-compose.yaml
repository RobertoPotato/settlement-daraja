services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: settlement:latest
    container_name: settlement-web
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - ./:/app
      - ./security:/app/security:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: settlement-nginx
    ports:
      - "8000:80"
      - "444:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_volume:
  media_volume: