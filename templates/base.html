<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Settlement Daraja{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <div class="mx-auto max-w-6xl px-4 py-6">
        <header class="mb-8 flex items-center justify-between rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
            <a href="{% url 'landing' %}" class="text-lg font-semibold text-cyan-700">Settlement Daraja</a>
            <nav class="flex items-center gap-3 text-sm">
                {% if user.is_authenticated %}
                    <a href="{% url 'home' %}" class="rounded-lg border border-cyan-300 px-3 py-1.5 text-cyan-700 hover:bg-cyan-50">Home</a>
                    <form method="post" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="rounded-lg border border-rose-300 px-3 py-1.5 text-rose-700 hover:bg-rose-50">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'account_login' %}" class="rounded-lg border border-cyan-300 px-3 py-1.5 text-cyan-700 hover:bg-cyan-50">Login</a>
                    <a href="{% url 'account_signup' %}" class="rounded-lg border border-emerald-300 px-3 py-1.5 text-emerald-700 hover:bg-emerald-50">Sign up</a>
                {% endif %}
            </nav>
        </header>

        {% if messages %}
            <section class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm {{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </section>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
